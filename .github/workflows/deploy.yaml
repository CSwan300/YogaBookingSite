# .github/workflows/deploy.yml
#
# Pipeline:
#   1. Run test suite (npm run test)
#   2. If tests pass, trigger a Render deploy via deploy hook
#   3. Render runs: npm ci && npm run seed, then starts the app

name: Test & Deploy

on:
  push:
    branches:
      - master

jobs:
  test-and-deploy:
    name: Test → Deploy
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      # ── 1. Checkout code ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Install dependencies ─────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run tests ────────────────────────────────────────
      # --forceExit ensures Jest doesn't hang after tests complete,
      # which can happen with ES modules (--experimental-vm-modules)
      - name: Run tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand --forceExit --config jest.config.mjs

      # ── 5. Trigger Render deploy (only if tests passed) ─────
      - name: Deploy to Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"